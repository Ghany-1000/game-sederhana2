<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Game Sederhana - Tap Target</title>
  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #87ceeb, #e0f7ff);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      color: #222;
    }

    h1 {
      margin-bottom: 10px;
      text-align: center;
    }

    .panel {
      width: min(95vw, 420px);
      display: flex;
      justify-content: space-between;
      margin-bottom: 12px;
      font-size: 18px;
      font-weight: bold;
    }

    #gameArea {
      width: min(95vw, 420px);
      height: 60vh;
      max-height: 520px;
      min-height: 360px;
      background: white;
      border: 3px solid #222;
      border-radius: 16px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 8px 20px rgba(0,0,0,0.15);
    }

    #message {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
      font-size: 22px;
      font-weight: bold;
      color: #333;
    }

    #target {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: #ff3b30;
      border: none;
      position: absolute;
      display: none;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
      touch-action: manipulation;
    }

    #target:active {
      transform: scale(0.95);
    }

    #startBtn {
      margin-top: 16px;
      padding: 14px 22px;
      font-size: 18px;
      border: none;
      border-radius: 12px;
      background: #007aff;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    #startBtn:active {
      transform: scale(0.98);
    }

    .hint {
      margin-top: 10px;
      font-size: 14px;
      color: #444;
      text-align: center;
      width: min(95vw, 420px);
    }
  </style>
</head>
<body>
  <h1>Tap Target</h1>

  <div class="panel">
    <div>Skor: <span id="score">0</span></div>
    <div>Waktu: <span id="time">30</span>d</div>
  </div>

  <div id="gameArea">
    <div id="message">Tekan tombol MULAI untuk bermain</div>
    <button id="target" aria-label="Target"></button>
  </div>

  <button id="startBtn">Mulai Game</button>
  <div class="hint">Sentuh lingkaran merah sebanyak mungkin sebelum waktu habis.</div>

  <script>
    const scoreEl = document.getElementById("score");
    const timeEl = document.getElementById("time");
    const gameArea = document.getElementById("gameArea");
    const target = document.getElementById("target");
    const startBtn = document.getElementById("startBtn");
    const message = document.getElementById("message");

    let score = 0;
    let timeLeft = 30;
    let playing = false;
    let countdown = null;
    let moveTimer = null;
    let speed = 700;

    function moveTarget() {
      const maxX = gameArea.clientWidth - target.offsetWidth;
      const maxY = gameArea.clientHeight - target.offsetHeight;

      const x = Math.random() * maxX;
      const y = Math.random() * maxY;

      target.style.left = x + "px";
      target.style.top = y + "px";
    }

    function stopGame() {
      playing = false;
      clearInterval(countdown);
      clearInterval(moveTimer);
      target.style.display = "none";
      message.style.display = "flex";
      message.textContent = "Waktu habis! Skor kamu: " + score;
      startBtn.textContent = "Main Lagi";
    }

    function startGame() {
      score = 0;
      timeLeft = 30;
      speed = 700;
      playing = true;

      scoreEl.textContent = score;
      timeEl.textContent = timeLeft;
      message.style.display = "none";
      target.style.display = "block";
      startBtn.textContent = "Ulangi";

      clearInterval(countdown);
      clearInterval(moveTimer);

      moveTarget();

      countdown = setInterval(() => {
        timeLeft--;
        timeEl.textContent = timeLeft;

        if (timeLeft <= 0) {
          stopGame();
        }
      }, 1000);

      moveTimer = setInterval(moveTarget, speed);
    }

    target.addEventListener("pointerdown", function (e) {
      if (!playing) return;

      e.preventDefault();
      score++;
      scoreEl.textContent = score;

      target.animate(
        [
          { transform: "scale(1)" },
          { transform: "scale(0.85)" },
          { transform: "scale(1)" }
        ],
        { duration: 120 }
      );

      moveTarget();

      if (score % 5 === 0) {
        speed = Math.max(250, speed - 70);
        clearInterval(moveTimer);
        moveTimer = setInterval(moveTarget, speed);
      }
    });

    startBtn.addEventListener("click", startGame);

    window.addEventListener("resize", () => {
      if (playing) moveTarget();
    });
  </script>
</body>
</html>
